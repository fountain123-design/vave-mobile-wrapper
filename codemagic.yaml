# Codemagic CI/CD 配置
# 构建 VAVE AI 移动应用（Flutter WebView 包装器）

workflows:
  # iOS 构建
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.gradle/caches
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: 获取 Flutter 依赖
        script: flutter pub get
      - name: 运行测试
        script: flutter test
      - name: 构建 iOS Release
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/Runner.app
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - your-email@example.com  # 替换为你的邮箱

  # Android 构建
  android-workflow:
    name: Android Workflow
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK with debug signing
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - 1276694046@qq.com  # 替换为你的邮箱
      # 可选：自动上传到 Google Play
      # google_play:
      #   credentials: $GOOGLE_PLAY_CREDENTIALS
      #   track: internal
